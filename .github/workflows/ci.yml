name: CI

on:
  workflow_dispatch:
  schedule:
    - cron: "0 19 * * *"  # сборка запускается каждый день в 19:00 UTC

jobs:
  cleanup:
    runs-on: ubuntu-latest
    # Достаточно write для действий с Action Runs:
    permissions:
      actions: write-all
    steps:
      - name: Clear older runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run list -L400 --json databaseId -q '.[].databaseId' \
            | tail -n+10 \
            | xargs -IID gh api "repos/$GITHUB_REPOSITORY/actions/runs/ID" -X DELETE || :

  build:
    runs-on: ubuntu-latest
    needs: cleanup
    permissions: write-all
    uses: ./.github/workflows/build.yml
    secrets: inherit
